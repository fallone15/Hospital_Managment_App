<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion – CareTrack</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="auth-page">

<div class="auth-modal show">
    <div class="auth-modal-content">
        <div class="auth-box">
            <div class="auth-header">
                <i class="fas fa-hospital-alt"></i>
                <h2>Connexion</h2>
                <p>Accédez à votre espace patient sécurisé</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label>Numéro de carte RFID ou Email</label>
                    <input type="text" id="identifier" name="identifier" 
                           placeholder="PAT001 ou exemple@gmail.com" required>
                </div>
                
                <div class="form-group">
                    <label>Code PIN (4 chiffres)</label>
                    <input type="password" id="pin" name="pin" 
                           maxlength="4" pattern="[0-9]{4}" 
                           placeholder="••••" required>
                </div>

                <button type="submit" class="btn btn-primary btn-block">
                    <i class="fas fa-sign-in-alt"></i> Se connecter
                </button>

                <p class="auth-footer">
                    Pas de compte ? <a href="register.html">Créer un compte</a>
                </p>
            </form>
        </div>
    </div>
</div>

<script src="login.js"></script>
</body>
</html>
